app            = 'unicorn-audit'
primary_region = 'nrt'          # 도쿄 — 한국 최근접 Fly.io 리전

[build]

[env]
  PORT      = "3000"
  NODE_ENV  = "production"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false   # 감사 서버는 항상 켜짐
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
